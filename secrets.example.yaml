# Davybase 密钥配置文件
#
# 使用说明：
# 1. 复制此文件为 secrets.yaml（该文件已在 .gitignore 中，不会被提交到 Git）
# 2. 填入你的 API 密钥
# 3. 确保 secrets.yaml 文件权限设置为仅所有者可读：chmod 600 secrets.yaml
#
# 或者，你也可以继续使用环境变量方式配置（优先级更高）

# get 笔记 API 凭据
# 运行 /note config 获取，或从 https://openapi.biji.com 申请
getnote:
  api_key: "gk_live_xxx"          # 替换为你的 API Key
  client_id: "cli_xxx"             # 替换为你的 Client ID

# LLM API 密钥
llm:
  # 智谱 AI - https://open.bigmodel.cn/
  zhipu_api_key: "your_zhipu_api_key"

  # MiniMax - https://platform.minimaxi.com/
  minimax_api_key: "your_minimax_api_key"

# 备用：环境变量前缀（如果需要使用环境变量方式）
# 环境变量优先级高于此文件
# export GETNOTE_API_KEY=gk_live_xxx
# export GETNOTE_CLIENT_ID=cli_xxx
# export ZHIPU_API_KEY=xxx
# export MINIMAX_API_KEY=xxx
