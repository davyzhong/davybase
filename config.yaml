# Davybase 配置文件
#
# 敏感信息（API 密钥）配置：
# 方式 1（推荐）：复制 secrets.example.yaml 为 secrets.yaml 并填入密钥
# 方式 2：设置环境变量（GETNOTE_API_KEY, ZHIPU_API_KEY 等）
# 详见：docs/SECRETS_SETUP.md

# Davybase 配置文件
# 完整配置说明：docs/CONFIGURATION.md

vault_path: /Users/qiming/ObsidianWiki
data_path: /Users/qiming/ObsidianWiki/processed    # 处理后的干净 Markdown
raw_path: /Users/qiming/ObsidianWiki/raw           # 原始文件库（只读）
logs_path: /Users/qiming/ObsidianWiki/logs

# 状态追踪目录
state_path: /Users/qiming/ObsidianWiki/.davybase

compiler:
  default_provider: zhipu
  batch_size: 15      # 单批次最大笔记数
  max_retries: 2      # LLM 调用最大重试次数
  providers:
    zhipu:
      model: glm-5
      name: 智谱 GLM5
    minimax:
      model: codex-MiniMax-M2.7
      name: MiniMax M2.7

# 并发管线配置（v4.0）
# 所有参数可在 CLI 命令中覆盖
pipeline:
  # 阶段 1: 摄取（Ingest）- 从 get 笔记 API 抽取原始笔记
  ingest:
    enabled: true
    batch_size: 10          # 单批次最大抽取数量
    concurrency: 2          # 并发请求数（推荐 1-3，过高会触发 API 限流）
    rate_limit_delay: 2.0   # API 请求间隔（秒），触发限流时增加此值
    page_delay: 3.0         # 分页请求间隔（秒）
    resume: true            # 默认断点续传

  # 阶段 2: 消化（Digest）- 生成标题、分类、移动
  digest:
    enabled: true
    worker_mode: pool           # pool=Worker 池模式，batch=批次模式
    workers:                    # Worker 池模式配置（每个 Worker 独立领取任务）
      - name: qwen
        provider: qwen
        batch_size: 2           # 每次处理 2 条
      # - name: zhipu           # 智谱 TPM 配额过低，禁用 digest 阶段
      #   provider: zhipu
      #   batch_size: 1
      - name: minimax
        provider: minimax
        batch_size: 2           # 每次处理 2 条

    # Provider 级别请求间隔配置（秒）
    # 智谱已禁用 digest，仅保留配置用于 compile 阶段
    provider_rate_limit_delays:
      zhipu: 120.0     # 智谱 TPM 配额极低，compile 阶段使用
      qwen: 3.0        # 千问配额充足，3 秒足够
      minimax: 3.0     # MiniMax 配额充足，3 秒足够

    # 动态批次配置（根据处理速度自动调整）
    dynamic_batch:
      enabled: true             # 是否启用动态批次调整
      strategy: threshold       # threshold=阈值模式（稳健），aggressive=激进模式
      min_batch_size: 1         # 最小批次大小
      max_batch_size: 8         # 最大批次大小（避免触发限流）
      adjustment_window: 10     # 滑动窗口大小（最近 N 次处理）
      speed_threshold: 1.2      # 速度超过平均 20% 才增加批次
      rate_limit_decay: 0.5     # 限流时批次衰减系数（0.5=减半）
      cooldown_seconds: 30.0    # 批次调整冷却时间（秒）

    batch_size: 10          # 单批次处理数量（批次模式使用）
    concurrency: 3          # 并发任务数（批次模式使用，推荐 1-5）
    provider_rotation: weighted  # 使用加权策略，优先分配给千问和 MiniMax
    apply: false            # 是否直接执行移动（预览模式=false）
    limit: null             # 限制处理数量（null=全部）

  # 阶段 3: 编译（Compile）- 聚合笔记为 Wiki 条目
  compile:
    enabled: true
    batch_size: 5           # 单批次笔记数量
    concurrent_batches: 1   # 同时编译的批次数量（推荐 1-2）
    provider_rotation: round_robin  # LLM 分配策略
    threshold: 3            # 触发编译的最小笔记数

# LLM 提供商配置
llm:
  # 默认提供商
  default: qwen
  # 轮询策略时的提供商顺序
  rotation_order: [qwen, minimax, zhipu]
  # 加权策略时的权重（总和不必为 1，会归一化）
  # 方案 C：智谱 TPM 配额低，降低权重至 5%
  weights:
    qwen: 0.45
    minimax: 0.5
    zhipu: 0.05

sync:
  schedule: "0 6 * * *"   # 每天早上 6 点
  rate_limit_delay: 1.0   # API 请求间隔（秒）
